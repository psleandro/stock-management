services:
  db:
    container_name: orders-api-db
    image: postgres
    environemnt:
      - POSTGRES_USER: ${POSTGRES_USER}
      - POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      - POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5433"
    volumes:
      - orders_db_data:/var/lib/postgresql
volumes:
  orders_db_data:
