name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL_TEST: postgres://app:secret@localhost:5432/appdb

    steps:
      - uses: actions/checkout@v4

      - name: Install postgres client (pg_isready)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait For DB
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -U test&& break
            sleep 1
          done

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
